name: Pull Shark — Auto-merge helper

# Automatically merges PRs that have the "auto-merge" label.
# Use this together with the get-pull-shark.sh script, or trigger it manually
# on any PR you open in this repo.

on:
  pull_request:
    types: [labeled]

jobs:
  auto-merge:
    if: github.event.label.name == 'auto-merge'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto-merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'merge',
            });
            console.log(`Merged PR #${pr.number}`);
