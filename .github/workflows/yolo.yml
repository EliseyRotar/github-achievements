name: YOLO — Auto-merge PR without review

# This workflow merges the triggering PR immediately without waiting for a review,
# which earns the YOLO achievement for the PR author.
#
# HOW TO USE:
#   1. Make sure branch protection is OFF (or you're exempt from review requirements).
#   2. Open any PR in this repo.
#   3. Add the label "yolo" to the PR — this workflow will auto-merge it.
#
# One-time badge: you only need to do this once.

on:
  pull_request:
    types: [labeled]

jobs:
  yolo-merge:
    if: github.event.label.name == 'yolo'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR without review (YOLO)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            console.log(`Merging PR #${pr.number} without review — YOLO!`);
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'merge',
              commit_title: `YOLO merge: ${pr.title}`,
            });
            console.log('Merged! The YOLO achievement will appear within 24h.');
